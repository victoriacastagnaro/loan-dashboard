<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loan Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // ─── Sample Data ─────────────────────────────────────────────────────────

    const LOAN = {
      amount: 3000,
      capitalPaid: 714.96,
      currency: "MXN",
      lender: "Adelanto de Sueldo",
      status: "Al día",
      paidPercent: 25,
      nextDueDate: "10 mar 2026",
      disbursedAt: new Date('2026-03-01'),
      payments: [
        { week: 1, date: "03 mar 2026", amount: 810.92, status: "Pagado",    isCurrent: false },
        { week: 2, date: "10 mar 2026", amount: 810.92, status: "Pendiente", isCurrent: true  },
        { week: 3, date: "17 mar 2026", amount: 810.92, status: "Pendiente", isCurrent: false },
        { week: 4, date: "24 mar 2026", amount: 810.92, status: "Pendiente", isCurrent: false },
      ],
    };

    // ─── Status config ────────────────────────────────────────────────────────

    const STATUS_STYLE = {
      Aprobado:   { pill: "bg-yellow-100 text-yellow-700", dot: "bg-yellow-500" },
      Acreditado: { pill: "bg-blue-100   text-blue-700",   dot: "bg-blue-500"   },
      "Al día":   { pill: "bg-green-100  text-green-700",  dot: "bg-green-500"  },
      "En mora":  { pill: "bg-red-100    text-red-700",    dot: "bg-red-500"    },
    };

    // ─── Icons ────────────────────────────────────────────────────────────────

    const CheckIcon = () => (
      <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}>
        <path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" />
      </svg>
    );

    const ChevronIcon = ({ open }) => (
      <svg
        style={{ transform: open ? "rotate(180deg)" : "rotate(0deg)", transition: "transform 0.3s" }}
        className="w-5 h-5 text-gray-400"
        fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}
      >
        <path strokeLinecap="round" strokeLinejoin="round" d="M19 9l-7 7-7-7" />
      </svg>
    );

    const CalendarIcon = () => (
      <svg className="w-4 h-4 text-indigo-500 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
        <path strokeLinecap="round" strokeLinejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
      </svg>
    );

    // ─── Sub-components ───────────────────────────────────────────────────────

    function StatusBadge({ status }) {
      const s = STATUS_STYLE[status] ?? STATUS_STYLE["Al día"];
      return (
        <span className={`inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold tracking-wide ${s.pill}`}>
          <span className={`w-2 h-2 rounded-full ${s.dot}`} />
          {status}
        </span>
      );
    }

    function BatteryBar({ paidPercent }) {
      const pendingPercent = 100 - paidPercent;
      return (
        <div className="flex items-center gap-1">
          <div className="relative flex-1 h-7 bg-gray-100 rounded-lg overflow-hidden border border-gray-200">
            <div
              className="absolute inset-y-0 left-0 transition-all duration-700 ease-out"
              style={{
                width: `${paidPercent}%`,
                background: "linear-gradient(to right, #5B4BE8, #8B7FF5)"
              }}
            />
            {[25, 50, 75].map((pos) => (
              <div
                key={pos}
                className="absolute inset-y-0 w-px bg-white"
                style={{ left: `${pos}%`, opacity: 0.5 }}
              />
            ))}
          </div>
          <div className="w-2 h-3.5 bg-gray-300 rounded-r-sm flex-shrink-0" />
        </div>
      );
    }

    function PaymentStatus({ payment }) {
      if (payment.status === "Pagado") {
        return (
          <span className="inline-flex items-center gap-1 text-green-600 font-medium text-xs">
            <CheckIcon />
            Pagado
          </span>
        );
      }
      if (payment.status === "Vencido") {
        return (
          <span className="inline-flex items-center gap-1 text-red-500 font-medium text-xs">
            <span className="w-2 h-2 rounded-full bg-red-500" />
            Vencido
          </span>
        );
      }
      if (payment.isCurrent) {
        return (
          <span className="inline-flex items-center gap-1 font-semibold text-xs" style={{ color: "#5B4BE8" }}>
            <span className="relative flex h-2 w-2">
              <span
                className="absolute inline-flex h-full w-full rounded-full"
                style={{
                  backgroundColor: "#5B4BE8",
                  opacity: 0.6,
                  animation: "ping 1.2s cubic-bezier(0,0,0.2,1) infinite"
                }}
              />
              <span className="relative inline-flex rounded-full h-2 w-2" style={{ backgroundColor: "#5B4BE8" }} />
            </span>
            Próxima
          </span>
        );
      }
      return <span className="text-gray-400 text-xs">Pendiente</span>;
    }

    // ─── Main Component ───────────────────────────────────────────────────────

    function LoanDashboard() {
      const [scheduleOpen, setScheduleOpen] = useState(false);
      const { amount, capitalPaid, currency, lender, status, paidPercent, nextDueDate, payments, disbursedAt } = LOAN;
      const disbursedLabel = disbursedAt.toLocaleDateString('es-MX', { day: 'numeric', month: 'short', year: 'numeric' });
      const remainingCapital = (amount - capitalPaid).toLocaleString("es-MX", {
        minimumFractionDigits: 2, maximumFractionDigits: 2,
      });
      const paidCount = payments.filter(p => p.status === "Pagado").length;
      const pendingCount = payments.length - paidCount;
      const pendingPercent = 100 - paidPercent;
      const total = payments.reduce((s, p) => s + p.amount, 0).toLocaleString("es-MX", {
        minimumFractionDigits: 2, maximumFractionDigits: 2,
      });

      return (
        <div className="min-h-screen flex items-start justify-center p-4 pt-8"
          style={{ background: "linear-gradient(135deg, #f1f5f9 0%, #eef2ff 100%)" }}>
          <div className="w-full space-y-3" style={{ maxWidth: 420 }}>

            {/* ── 1. Credit Status Header ───────────────────────────────── */}
            <div className="bg-white rounded-2xl p-5" style={{ boxShadow: "0 4px 24px rgba(91,75,232,0.08)" }}>
              <div className="flex items-center justify-between mb-2">
                <StatusBadge status={status} />
                <span className="text-xs text-gray-400 font-medium">{lender}</span>
              </div>

              <p className="text-xs text-gray-400 mb-4">${amount.toLocaleString('es-MX')} acreditados en tu cuenta bancaria el {disbursedLabel}</p>

              <p className="text-xs text-gray-400 mt-1">Te queda por devolver</p>
              <div className="flex items-baseline gap-2">
                <span className="text-4xl font-extrabold text-gray-900 tracking-tight">
                  ${remainingCapital}
                </span>
                <span className="text-base font-medium text-gray-400">{currency}</span>
              </div>

              <div className="mt-4 h-1 w-16 rounded-full"
                style={{ background: "linear-gradient(to right, #5B4BE8, #8B7FF5)" }} />
            </div>

            {/* ── 2. Battery Progress Bar ───────────────────────────────── */}
            <div className="bg-white rounded-2xl p-5" style={{ boxShadow: "0 4px 24px rgba(91,75,232,0.08)" }}>
              <div className="flex justify-between items-center mb-3">
                <div className="flex items-center gap-1.5">
                  <span className="w-2.5 h-2.5 rounded-full" style={{ backgroundColor: "#5B4BE8" }} />
                  <span className="text-sm font-semibold" style={{ color: "#5B4BE8" }}>{paidCount} de {payments.length} cuotas pagadas</span>
                </div>
                <div className="flex items-center gap-1.5">
                  <span className="text-sm text-gray-400">Te faltan {pendingCount}</span>
                  <span className="w-2.5 h-2.5 rounded-full bg-gray-200" />
                </div>
              </div>

              <BatteryBar paidPercent={paidPercent} />

              <div className="mt-4 flex items-center gap-2 rounded-xl px-3 py-2" style={{ backgroundColor: "#eef2ff" }}>
                <CalendarIcon />
                <p className="text-xs text-gray-600">
                  <span className="font-semibold text-gray-800">El próximo vencimiento de tu cuota es el</span>{" "}
                  {nextDueDate}
                </p>
              </div>

              <div className="mt-2 flex items-center gap-2 rounded-full px-3 py-2 self-start" style={{ backgroundColor: "#EEF0FF" }}>
                <span className="text-xs text-indigo-700">💼 Los pagos se descuentan semanalmente de tu nómina</span>
              </div>
            </div>

            {/* ── 3. Payment Schedule ───────────────────────────────────── */}
            <div className="bg-white rounded-2xl overflow-hidden" style={{ boxShadow: "0 4px 24px rgba(91,75,232,0.08)" }}>
              <button
                onClick={() => setScheduleOpen(v => !v)}
                className="w-full flex items-center justify-between px-5 py-4 text-left"
                style={{ background: "none", border: "none", cursor: "pointer" }}
              >
                <span className="text-sm font-semibold text-gray-800">
                  Ver detalle —{" "}
                  <span style={{ color: "#5B4BE8" }}>{payments.length} pagos semanales</span>
                </span>
                <ChevronIcon open={scheduleOpen} />
              </button>

              <div style={{
                maxHeight: scheduleOpen ? "400px" : "0px",
                opacity: scheduleOpen ? 1 : 0,
                overflow: "hidden",
                transition: "max-height 0.35s ease, opacity 0.25s ease"
              }}>
                <div className="border-t border-gray-100">
                  <table className="w-full" style={{ fontSize: 12 }}>
                    <thead>
                      <tr className="bg-gray-50">
                        <th className="text-left px-4 py-2.5 text-gray-500 font-semibold">Cuota</th>
                        <th className="text-left px-4 py-2.5 text-gray-500 font-semibold">Fecha de pago</th>
                        <th className="text-right px-4 py-2.5 text-gray-500 font-semibold">Monto</th>
                      </tr>
                    </thead>
                    <tbody>
                      {payments.map((p) => (
                        <tr
                          key={p.week}
                          className="border-t border-gray-50"
                          style={{ backgroundColor: p.isCurrent ? "rgba(91,75,232,0.05)" : "transparent" }}
                        >
                          <td className="px-4 py-3">
                            <span
                              className="inline-flex items-center justify-center rounded-full text-xs font-bold"
                              style={{
                                width: 24, height: 24,
                                backgroundColor: p.isCurrent ? "#5B4BE8"
                                  : p.status === "Pagado" ? "#dcfce7" : "#f3f4f6",
                                color: p.isCurrent ? "#fff"
                                  : p.status === "Pagado" ? "#16a34a" : "#6b7280",
                              }}
                            >
                              {p.week}
                            </span>
                          </td>
                          <td className="px-4 py-3 text-gray-600">{p.date}</td>
                          <td className="px-4 py-3 text-right font-semibold text-gray-800">
                            ${p.amount.toFixed(2)}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>

                  <div className="border-t border-gray-100 px-4 py-3 flex justify-between items-center bg-gray-50">
                    <span className="text-xs text-gray-500 font-medium">Total a pagar</span>
                    <span className="text-sm font-extrabold text-gray-800">${total}</span>
                  </div>
                </div>
              </div>
            </div>

            <p className="text-center text-xs text-gray-400 pb-6">
              Pagos procesados cada lunes · {lender}
            </p>
          </div>
        </div>
      );
    }

    // ─── Render ───────────────────────────────────────────────────────────────

    ReactDOM.createRoot(document.getElementById("root")).render(<LoanDashboard />);
  </script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    @keyframes ping {
      75%, 100% { transform: scale(2); opacity: 0; }
    }
  </style>
</body>
</html>
